<style>
  :root{
    --bg:#f4f1ea;
    --card:#ffffff;
    --sage:#7c8b6f;
    --sage-dark:#5e6b53;
    --sage-light:#e4e9df;
    --stone:#d9d3c7;
    --stone-dark:#a89d8a;
    --charcoal:#33312e;
    --charcoal-soft:#6b675f;
    --correct:#c8e0c6;
    --correct-text:#3d6b3a;
    --incorrect:#f0d1cd;
    --incorrect-text:#a5443a;
    --radius:20px;
    --shadow: 0 4px 20px rgba(51,49,46,0.07);
    --shadow-lg: 0 10px 30px rgba(51,49,46,0.12);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--bg);
    color:var(--charcoal);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    overscroll-behavior-y:none;
  }
  #app{
    max-width:560px;
    margin:0 auto;
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    position:relative;
  }
  header{
    padding:calc(env(safe-area-inset-top) + 22px) 24px 14px;
    flex-shrink:0;
  }
  header h1{
    font-size:1.5rem;
    font-weight:700;
    letter-spacing:-0.02em;
    margin:0;
  }
  header p{
    margin:4px 0 0;
    color:var(--charcoal-soft);
    font-size:0.9rem;
  }
  main{
    flex:1;
    overflow-y:auto;
    padding:0 20px calc(96px + env(safe-area-inset-bottom));
    -webkit-overflow-scrolling:touch;
  }
  .page{display:none; animation:fadeIn .35s ease;}
  .page.active{display:block;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

  /* Tabs */
  .tabs{
    display:flex;
    gap:6px;
    background:var(--stone);
    padding:4px;
    border-radius:14px;
    margin-bottom:20px;
    position:sticky;
    top:0;
    z-index:5;
    flex-wrap:wrap;
  }
  .tab-btn{
    flex:1;
    min-width:70px;
    border:none;
    background:transparent;
    padding:10px 4px;
    font-size:0.8rem;
    font-weight:600;
    color:var(--charcoal-soft);
    border-radius:10px;
    cursor:pointer;
    transition:background .25s ease, color .25s ease, box-shadow .25s ease;
  }
  .tab-btn.active{
    background:var(--card);
    color:var(--charcoal);
    box-shadow:var(--shadow);
  }

  /* Grid of review cards */
  .grid{
    display:grid;
